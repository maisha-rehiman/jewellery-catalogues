
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIJOUQ Luxury Catalogue</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --gold: #C5A059; --black: #111; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Georgia', serif; }
        .swiper { width: 100%; height: 100vh; }
        
        /* Book Spread Effect */
        .swiper-slide { background: #fff; height: 100%; display: flex; align-items: center; justify-content: center; }
        .details-slide { border-right: 1px solid #eee; }
        
        .content-container { padding: 60px; max-width: 500px; }
        .vendor-label { color: var(--gold); letter-spacing: 3px; font-size: 0.7rem; text-transform: uppercase; font-family: sans-serif; }
        .title { font-size: 2.5rem; margin: 15px 0; font-weight: normal; color: var(--black); }
        .sku { color: #aaa; font-size: 0.7rem; font-family: sans-serif; }
        .divider { width: 40px; height: 2px; background: var(--gold); margin: 25px 0; }
        
        label { display: block; font-size: 0.6rem; color: #888; letter-spacing: 1px; font-family: sans-serif; margin-bottom: 5px; }
        .specs p { font-size: 0.9rem; color: #555; line-height: 1.6; margin-bottom: 20px; }
        .price { font-size: 2rem; margin: 30px 0; color: var(--black); }

        .btn-main { width: 100%; padding: 18px; background: var(--black); color: #fff; border: none; cursor: pointer; letter-spacing: 1px; margin-bottom: 10px; }
        .btn-row { display: flex; gap: 10px; }
        .btn-sub { flex: 1; padding: 15px; background: transparent; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-size: 0.7rem; }

        .product-image { width: 100%; height: 100%; background-size: cover; background-position: center; }

        /* Mobile View (Stacking) */
        @media (max-width: 800px) {
            .content-container { padding: 30px; }
            .title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="swiper">
        <div class="swiper-wrapper">
    <div class="swiper-slide details-slide">
        <div class="content-container">
            <span class="vendor-label">Noi Gioielli</span>
            <h1 class="title">Onda Enamel Pendant, Rose Gold</h1>
            <p class="sku">REF: PN-2820</p>
            <div class="divider"></div>
            <div class="specs">
                <label>DESCRIPTION</label>
                <p>Wave?inspired flow in enamel with diamonds —a statement accent piece.</p>
                <label>DETAILS</label>
                <p>Gold Weight: 7.15 gDiamond (Carat): RD 0.27 CT, VS-GGold Color: RoseResizable: NoMade In: Italy</p>
            </div>
            <div class="price">QAR 10720</div>
            <div class="buttons">
                <button onclick="sendAction('Availability', 'PN-2820')" class="btn-main">CHECK AVAILABILITY</button>
                <div class="btn-row">
                    <button onclick="sendAction('Ask Price', 'PN-2820')" class="btn-sub">ASK PRICE</button>
                    <button onclick="sendAction('Advisor', 'PN-2820')" class="btn-sub">ADVISOR</button>
                </div>
            </div>
        </div>
    </div>
    <div class="swiper-slide image-slide">
        <div class="product-image" style="background-image: url('https://cdn.shopify.com/s/files/1/0707/3991/9016/files/PN-2820_2511ebb5-dd0e-40cb-b517-257ecdab03d2.jpg?v=1757912561')"></div>
    </div>
</div>
        <div class="swiper-button-next" style="color: var(--gold)"></div>
        <div class="swiper-button-prev" style="color: var(--gold)"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            slidesPerView: 1,
            breakpoints: {
                800: { slidesPerView: 2, slidesPerGroup: 2 } // This creates the 2-page book look on desktop
            },
            navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
        });

        function sendAction(type, code) {
            fetch('https://n8n.srv1138489.hstgr.cloud/webhook/weblink-buttons', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: type, product: code })
            }).then(() => alert('Request sent for ' + code));
        }
    </script>
</body>
</html>
